# config/dev.yaml
# Developer environment – small dataset, verbose logging, local paths.
# Module 17: environment-specific configuration values.

pipeline:
  name: "Sales Analytics Pipeline [DEV]"
  env: dev

source:
  type: csv
  path: "./data/sales_raw.csv"         # generated by generate_data.py
  encoding: utf-8
  chunk_size: 5000                     # rows per parallel chunk

output:
  dir: "./output/dev"
  cleaned_csv:  "cleaned_sales.csv"
  summary_json: "aggregated_summary.json"
  report_md:    "pipeline_report.md"

logging:
  level: DEBUG
  log_dir: "./logs"
  log_file: "pipeline_dev.log"

parallel:
  max_workers: 2                       # fewer workers on dev
  chunk_size: 10000

async:
  max_concurrent: 3
  request_timeout_s: 5

validation:
  max_discount: 1.0
  max_quantity: 500
  min_price: 0.01
